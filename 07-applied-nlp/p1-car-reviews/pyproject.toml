[project]
name = "car-reviews-nlp"
version = "0.1.0"
description = "NLP analysis of car reviews by brand and specific model (HuggingFace sentiment on CPU)."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24,<2.0",
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "scipy>=1.10",
    "matplotlib>=3.7",
    "torch>=2.2,<2.5",
    "transformers>=4.44,<4.49",
    "datasets>=2.19,<3.1",
    "huggingface_hub>=0.24",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
keywords = ["keybert>=0.8", "sentence-transformers>=3.0,<3.1"]
topics = ["bertopic>=0.16", "umap-learn>=0.5", "hdbscan>=0.8"]

[tool.pytest.ini_options]
markers = [
    "slow: loads a real HF model / downloads weights; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
