[project]
name = "secure-ml-pipeline"
version = "0.1.0"
description = "ML supply-chain hardening: pickle-deserialization PoC + safetensors/scan/sign/verify CI gate."
requires-python = ">=3.10"
dependencies = [
    "torch>=2.2,<2.6",
    "numpy>=1.24",
    "scikit-learn>=1.3",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
# Optional ENHANCED path (the offline default does not need these):
#   safetensors  - real safetensors writer (else a pure-python fallback is used)
#   modelscan    - protectai static model scanner
# cosign (Go binary) + docker are installed separately, not via pip.
enhanced = ["safetensors>=0.4", "modelscan>=0.7"]

[tool.pytest.ini_options]
markers = [
    "slow: trains a model end-to-end; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
