[project]
name = "compression"
version = "0.1.0"
description = "Model compression & efficient inference on CPU: pruning, dynamic quantization, distillation."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24,<2.0",
    "torch>=2.2,<2.3",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
vision = ["torchvision>=0.17,<0.18"]

[tool.pytest.ini_options]
markers = [
    "slow: requires torchvision / MNIST download; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
