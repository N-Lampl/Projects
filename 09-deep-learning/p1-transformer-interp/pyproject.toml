[project]
name = "transformer-interp"
version = "0.1.0"
description = "Tiny decoder-only transformer trained from scratch + mechanistic interpretability (CPU)."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24,<2.0",
    "torch>=2.0",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
hf = ["transformers>=4.38"]

[tool.pytest.ini_options]
markers = [
    "slow: requires transformers / distilgpt2 (cross-check); excluded via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
