[project]
name = "defend-rag"
version = "0.1.0"
description = "Layered guardrails + a from-scratch prompt-injection detector that defend the p4 vulnerable RAG."
requires-python = ">=3.10"
dependencies = [
    "scikit-learn>=1.3",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "joblib>=1.3",
    "torch>=2.2,<2.5",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
# Optional enhanced path (NOT needed for the default offline run):
nemo = ["nemoguardrails>=0.15"]

[tool.pytest.ini_options]
markers = [
    "slow: trains the detector + replays the full attack battery; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
