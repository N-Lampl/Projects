[project]
name = "refusal-direction-interp"
version = "0.1.0"
description = "Mechanistic interpretability of LLM refusal: extract/ablate/measure a refusal direction (analysis only)."
requires-python = ">=3.10"
dependencies = [
    "torch>=2.2,<2.5",
    "numpy>=1.24",
    "matplotlib>=3.7",
    "scikit-learn>=1.3",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
# OPTIONAL enhanced path: extract from a real open-weight instruct model.
real = ["transformers>=4.44", "accelerate>=0.30"]

[tool.pytest.ini_options]
markers = [
    "slow: runs the full pipeline / writes figures; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
