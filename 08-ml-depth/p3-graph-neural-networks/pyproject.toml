[project]
name = "gnn"
version = "0.1.0"
description = "A from-scratch 2-layer GCN vs a graph-blind MLP for node classification (CPU)."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24,<2.0",
    "torch>=2.0",
    "scikit-learn>=1.3",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]

[tool.pytest.ini_options]
markers = [
    "slow: downloads real Cora; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
