title: Remote Process Execution via WMIC
id: 8a1b2c3d-0006-4a00-9000-000000000006
status: experimental
description: Detects wmic creating a process on a remote node, a common lateral-movement technique.
author: portfolio
references:
  - https://attack.mitre.org/techniques/T1047/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: '\wmic.exe'
  selection_cli:
    CommandLine|contains|all:
      - '/node:'
      - 'process'
      - 'call'
      - 'create'
  condition: selection_img and selection_cli
falsepositives:
  - Remote administration tooling.
level: high
tags:
  - attack.execution
  - attack.lateral-movement
  - attack.t1047
