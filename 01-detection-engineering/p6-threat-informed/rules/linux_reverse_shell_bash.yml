title: Bash Reverse Shell via /dev/tcp
id: 8a1b2c3d-0005-4a00-9000-000000000005
status: experimental
description: Detects bash reverse-shell one-liners using the /dev/tcp pseudo-device.
author: portfolio
references:
  - https://attack.mitre.org/techniques/T1059/004/
logsource:
  category: process_creation
  product: linux
detection:
  selection_img:
    Image|endswith:
      - '/bash'
      - '/sh'
  selection_cli:
    CommandLine|contains:
      - '/dev/tcp/'
      - '/dev/udp/'
  condition: selection_img and selection_cli
falsepositives:
  - Rare legitimate scripts probing TCP ports.
level: high
tags:
  - attack.execution
  - attack.t1059.004
