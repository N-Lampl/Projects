title: LSASS Memory Access via Comsvcs MiniDump
id: 8a1b2c3d-0001-4a00-9000-000000000001
status: experimental
description: Detects credential dumping by calling MiniDump on lsass via rundll32 comsvcs.dll.
author: portfolio
references:
  - https://attack.mitre.org/techniques/T1003/001/
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: '\rundll32.exe'
  selection_cli:
    CommandLine|contains|all:
      - 'comsvcs.dll'
      - 'MiniDump'
  condition: selection_img and selection_cli
falsepositives:
  - Rare legitimate diagnostic dumps by administrators.
level: high
tags:
  - attack.credential-access
  - attack.t1003.001
