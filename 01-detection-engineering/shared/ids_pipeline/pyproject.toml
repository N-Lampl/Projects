[project]
name = "ids-pipeline"
version = "0.1.0"
description = "Reusable leak-free tabular-IDS library (RandomForest + SOC metrics) for the detection-engineering track."
requires-python = ">=3.10"
dependencies = [
    "scikit-learn>=1.3",
    "numpy>=1.24",
    "pandas>=2.0",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
# OPTIONAL enhanced path: gradient-boosted trees instead of RandomForest.
xgb = ["xgboost>=2.0"]
dev = ["pytest>=8", "ruff>=0.5"]

[tool.pytest.ini_options]
markers = [
    "slow: trains the full pipeline end-to-end; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
