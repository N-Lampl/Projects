[project]
name = "fraud-detection"
version = "0.1.0"
description = "Supervised credit-card fraud detection on a highly imbalanced table (PR-AUC first)."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]
xgb = ["xgboost>=2.0"]

[tool.pytest.ini_options]
markers = [
    "slow: trains every model end-to-end; excluded from CI via -m 'not slow'",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
